name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Connect WireGuard VPN
        uses: egor-tensin/setup-wireguard@v1
        with:
          endpoint: ${{ secrets.WG_SERVER_ENDPOINT }}
          endpoint_public_key: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          ips: 10.66.66.4/32
          private_key: ${{ secrets.WG_SERVER_PRIVATE_KEY }}
          preshared_key: ${{ secrets.WG_PRESHARED_KEY }}
          allowed_ips: 10.66.66.1/32

      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /var/www/landing-page
            git pull origin main
            npm install --production
            npm run migrate up
            pm2 restart cloudforge-landing-page
